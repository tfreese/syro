String publishArtifact = project.name
String publishVersion = project.version
String publishDescription = project.description

publishing {
    publications {
        create("syroMvn", MavenPublication) {
            versionMapping {
                // id("java-library")
                // - api = <scope>compile</scope>
                // - runtimeOnly = <scope>runtime</scope>
                //
                // id("java")
                // - implementation = <scope>runtime</scope>
                // - runtimeOnly = <scope>runtime</scope>

                usage(Usage.JAVA_API) {
                    // Nimm die Abhängigkeitsauflösung aus genau dieser Konfiguration.
                    fromResolutionOf(JavaPlugin.COMPILE_CLASSPATH_CONFIGURATION_NAME)
                }
                usage(Usage.JAVA_RUNTIME) {
                    // Nimm das bereits berechnete Resolution-Result der aktuellen Usage/Variante.
                    fromResolutionResult()
                }
            }

            from(components.java) // Jar with Dependencies.

            // Only JAR, no Dependencies.
            // artifact(tasks.named("jar")) {
            //     type       = "source"
            //     extension  = "jar"
