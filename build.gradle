            //     classifier("macos-x64")
            //     extension("dmg")
            // }
            // artifact("windows-app-x64.exe") {
            //     classifier("windows-x64")
            //     extension("exe")
            // }

            pom {
                // Is not generated in the POM.
                // packaging = "jar"

                name = publishArtifact
                description = publishDescription
                // url = "http://www.example.com/library"
                //
                // properties = [
