// Workaround: maven-publish 'versionMapping' registers an internal withXml action as a Groovy closure.
// Gradle 9.x configuration cache serializes this closure, but the Groovy build-script 'this' reference
// cannot be deserialized -> "Cannot read field 'delegate' because 'this' is null".
// Fix: mark POM generation tasks as incompatible with configuration cache so they always re-execute.
// tasks.withType(GenerateMavenPom).configureEach {
//     notCompatibleWithConfigurationCache("maven-publish: internal withXml Groovy closure is not configuration-cache compatible")
// }

